<!DOCTYPE html>
<html>
<head>
  <title>Entrep Sorting Journey</title>
  <style>
    body {
      background: linear-gradient(to bottom, #0d0d0d, #1a0000);
      color: gold;
      font-family: Georgia, serif;
      text-align: center;
      padding: 50px;
    }

    h1 { font-size: 40px; margin-bottom: 10px; }
    input { padding: 10px; font-size: 16px; width: 250px; margin: 10px 0; }
    button { padding: 10px 20px; font-size: 16px; background-color: darkred; color: white; border: none; cursor: pointer; margin-top: 10px; }
    
    .page { display: none; }
    .boxes { display: flex; justify-content: center; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
    .box { width: 120px; height: 120px; background-color: #330000; border: 2px solid gold; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; transition: 0.3s; }
    .box:hover { background-color: gold; color: black; transform: scale(1.05); }

    #finalMessage { font-size: 28px; margin-top: 50px; }
  </style>
</head>

<body>

<h1>✨ Entrep Days Sorting Journey ✨</h1>

<!-- PAGE 1: Student Number -->
<div id="page1" class="page" style="display:block;">
  <p>Enter your Student Number:</p>
  <input type="text" id="studentNumber" placeholder="Student Number"><br>
  <button onclick="goToName()">Next Journey</button>
</div>

<!-- PAGE 2: Name -->
<div id="page2" class="page">
  <p>Enter your Full Name:</p>
  <input type="text" id="studentName" placeholder="Full Name"><br>
  <button onclick="goToBoxes()">Next Journey</button>
</div>

<!-- PAGE 3: Choose Boxes -->
<div id="page3" class="page">
  <p>Choose a magical box to reveal your team:</p>
  <div class="boxes">
    <div class="box" onclick="chooseTeam()">Box 1</div>
    <div class="box" onclick="chooseTeam()">Box 2</div>
    <div class="box" onclick="chooseTeam()">Box 3</div>
    <div class="box" onclick="chooseTeam()">Box 4</div>
  </div>
</div>

<!-- PAGE 4: Final -->
<div id="page4" class="page">
  <div id="finalMessage"></div>
</div>

<script>
  const groups = [
    { name: "Team Phoenix 🔥", count: 0 },
    { name: "Team Dragon 🐉", count: 0 },
    { name: "Team Griffin 🦅", count: 0 },
    { name: "Team Serpent 🐍", count: 0 }
  ];

  let assignedStudents = [];

  function goToName() {
    const studentNumber = document.getElementById("studentNumber").value.trim();
    if(studentNumber === "") {
      alert("Please enter your Student Number!");
      return;
    }
    if(assignedStudents.includes(studentNumber)) {
      alert("This student number has already started the journey!");
      return;
    }
    // hide page 1, show page 2
    document.getElementById("page1").style.display = "none";
    document.getElementById("page2").style.display = "block";
  }

  function goToBoxes() {
    const studentName = document.getElementById("studentName").value.trim();
    if(studentName === "") {
      alert("Please enter your Full Name!");
      return;
    }
    // hide page 2, show page 3
    document.getElementById("page2").style.display = "none";
    document.getElementById("page3").style.display = "block";
  }

  function chooseTeam() {
    const studentNumber = document.getElementById("studentNumber").value.trim();
    const studentName = document.getElementById("studentName").value.trim();

    // assign to group with minimum count
    let minCount = Math.min(...groups.map(g => g.count));
    let availableGroups = groups.filter(g => g.count === minCount);
    let chosenGroup = availableGroups[Math.floor(Math.random() * availableGroups.length)];
    chosenGroup.count++;
    assignedStudents.push(studentNumber);

    // hide page 3, show page 4
    document.getElementById("page3").style.display = "none";
    document.getElementById("page4").style.display = "block";

    document.getElementById("finalMessage").innerHTML =
      `🧙 ${studentName} (${studentNumber}) has been assigned to <strong>${chosenGroup.name}</strong><br><br>✨ Your journey has begun now! ✨`;
  }
</script>

</body>
</html>
