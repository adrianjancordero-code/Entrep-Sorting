<!DOCTYPE html>
<html>
<head>
  <title>Entrep Sorting Ceremony</title>

  <style>
    body {
      background: linear-gradient(to bottom, #0d0d0d, #1a0000);
      color: gold;
      font-family: Georgia, serif;
      text-align: center;
      padding: 30px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .form-section {
      margin-top: 30px;
    }

    input {
      padding: 10px;
      margin: 5px;
      font-size: 16px;
      width: 220px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: darkred;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }

    .boxes {
      display: none;
      margin-top: 40px;
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .box {
      width: 120px;
      height: 120px;
      background-color: #330000;
      border: 2px solid gold;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      transition: 0.3s;
    }

    .box:hover {
      background-color: gold;
      color: black;
      transform: scale(1.05);
    }

    #result {
      margin-top: 30px;
      font-size: 22px;
    }

  </style>
</head>

<body>

<h1>✨ Entrep Days Sorting Ceremony ✨</h1>
<p>Enter the Magical Chamber of Assignment</p>

<div class="form-section">
  <input type="text" id="studentNumber" placeholder="Enter Student Number"><br>
  <input type="text" id="studentName" placeholder="Enter Full Name"><br>
  <button onclick="proceed()">Proceed</button>
</div>

<div class="boxes" id="boxSection">
  <div class="box" onclick="chooseBox()">Box 1</div>
  <div class="box" onclick="chooseBox()">Box 2</div>
  <div class="box" onclick="chooseBox()">Box 3</div>
  <div class="box" onclick="chooseBox()">Box 4</div>
</div>

<h2 id="result"></h2>

<script>

const groups = [
  { name: "Team Phoenix 🔥", count: 0 },
  { name: "Team Dragon 🐉", count: 0 },
  { name: "Team Griffin 🦅", count: 0 },
  { name: "Team Serpent 🐍", count: 0 }
];

let assignedStudents = [];

function proceed() {
  const studentNumber = document.getElementById("studentNumber").value.trim();
  const studentName = document.getElementById("studentName").value.trim();

  if(studentNumber === "" || studentName === "") {
    alert("Please enter both Student Number and Name!");
    return;
  }

  if(assignedStudents.includes(studentNumber)) {
    alert("This Student Number has already been assigned!");
    return;
  }

  document.getElementById("boxSection").style.display = "flex";
}

function chooseBox() {
  const studentNumber = document.getElementById("studentNumber").value.trim();
  const studentName = document.getElementById("studentName").value.trim();

  let minCount = Math.min(...groups.map(g => g.count));
  let availableGroups = groups.filter(g => g.count === minCount);
  let chosenGroup = availableGroups[Math.floor(Math.random() * availableGroups.length)];

  chosenGroup.count++;
  assignedStudents.push(studentNumber);

  document.getElementById("result").innerHTML =
    "🧙 " + studentName + " (" + studentNumber + "), you have been chosen for <br><br><strong>" 
    + chosenGroup.name + "</strong>";

  document.getElementById("boxSection").style.display = "none";
  document.getElementById("studentNumber").value = "";
  document.getElementById("studentName").value = "";
}

</script>

</body>
</html>
